<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แอปพลิเคชันฝึกอ่าน</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Mali -->
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 สำหรับหน้าต่างแจ้งเตือนและโหลดข้อมูล -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Mali', cursive; }
        
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* พื้นหลังลวดลายตารางน่ารักสดใส */
        body {
            background-color: #f0fdf4;
            background-image: radial-gradient(#dcfce7 2px, transparent 2px);
            background-size: 30px 30px;
        }
        
        /* อนิเมชันการเปลี่ยนหน้า */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* กำหนดฟอนต์ให้ SweetAlert */
        .swal2-title, .swal2-content, .swal2-popup { font-family: 'Mali', cursive !important; }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen w-screen overflow-hidden flex justify-center items-center">

    <div class="w-full h-full max-w-4xl max-h-[1024px] bg-white/90 backdrop-blur-sm shadow-2xl md:rounded-[3rem] overflow-hidden relative flex flex-col border-4 border-white">
        
        <!-- ================= VIEW 1: หน้าเลือกผู้ใช้งาน ================= -->
        <div id="view-select-user" class="absolute inset-0 flex flex-col items-center justify-center p-8 fade-in z-10 bg-white">
            <h1 class="text-4xl md:text-5xl font-bold text-center mb-12 text-teal-600">
                📚 ยินดีต้อนรับคนเก่ง<br><span class="text-2xl md:text-3xl text-gray-500 mt-4 block">หนูคือใครเอ่ย?</span>
            </h1>
            <div class="flex flex-col md:flex-row gap-8 md:gap-16">
                <!-- ปุ่มน้องเจอาร์ -->
                <button onclick="selectUser('JR')" class="group flex flex-col items-center p-6 bg-blue-50 rounded-3xl border-4 border-blue-200 hover:border-blue-400 shadow-lg transition-transform transform active:scale-95 hover:-translate-y-2">
                    <div class="w-32 h-32 md:w-48 md:h-48 bg-blue-200 rounded-full flex items-center justify-center mb-4 text-6xl md:text-8xl shadow-inner">👦🏻</div>
                    <span class="text-3xl md:text-4xl font-bold text-blue-600">น้องเจอาร์</span>
                </button>
                <!-- ปุ่มน้องนโม -->
                <button onclick="selectUser('Namo')" class="group flex flex-col items-center p-6 bg-pink-50 rounded-3xl border-4 border-pink-200 hover:border-pink-400 shadow-lg transition-transform transform active:scale-95 hover:-translate-y-2">
                    <div class="w-32 h-32 md:w-48 md:h-48 bg-pink-200 rounded-full flex items-center justify-center mb-4 text-6xl md:text-8xl shadow-inner">👧🏻</div>
                    <span class="text-3xl md:text-4xl font-bold text-pink-600">น้องนโม</span>
                </button>
            </div>
        </div>

        <!-- ================= VIEW 2: หน้า Dashboard (รายการบทความ) ================= -->
        <div id="view-dashboard" class="hidden absolute inset-0 flex flex-col bg-slate-50 fade-in z-10 h-full">
            <!-- แถบ Header และ Progress Bar -->
            <div class="bg-white p-6 shadow-sm z-20 sticky top-0 rounded-b-3xl">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-4">
                        <button onclick="logout()" class="w-12 h-12 bg-gray-100 rounded-full text-xl hover:bg-gray-200 transition-colors">🏠</button>
                        <h2 id="dashboard-greeting" class="text-2xl md:text-3xl font-bold text-gray-800">สวัสดี...</h2>
                    </div>
                    <div class="font-bold text-xl text-teal-600 bg-teal-50 px-4 py-2 rounded-full border border-teal-200">
                        สำเร็จ: <span id="progress-text">0/0</span>
                    </div>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-6 border shadow-inner overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-teal-400 to-green-400 h-6 rounded-full transition-all duration-500 ease-out flex items-center justify-end px-2" style="width: 0%">
                        <span class="text-white text-xs font-bold">⭐</span>
                    </div>
                </div>
            </div>
            
            <!-- รายการบทความ -->
            <div id="category-list" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-8 pb-24">
                <!-- เนื้อหาจะถูกสร้างผ่าน JavaScript -->
            </div>
        </div>

        <!-- ================= VIEW 3: หน้าอ่านบทความ ================= -->
        <div id="view-article" class="hidden absolute inset-0 flex flex-col bg-white fade-in z-20 h-full">
            <div class="flex items-center p-4 border-b bg-yellow-50/50 sticky top-0 z-10 backdrop-blur-sm">
                <button onclick="showView('view-dashboard')" class="flex items-center text-gray-600 font-bold bg-white px-4 py-2 rounded-full shadow-sm border active:bg-gray-100">⬅️ กลับ</button>
                <div class="flex-1 text-center text-xl text-gray-400 pr-24" id="article-category-label">หมวดหมู่</div>
            </div>
            
            <div class="flex-1 overflow-y-auto no-scrollbar p-6 md:p-12 pb-32">
                <h1 id="article-title" class="text-3xl md:text-5xl font-bold text-teal-700 mb-8 leading-tight text-center">ชื่อเรื่อง</h1>
                <div id="article-content" class="text-2xl md:text-3xl text-gray-800 leading-relaxed md:leading-[2.5rem] tracking-wide">
                    <!-- เนื้อหาจะถูกเพิ่มเข้ามาพร้อมย่อหน้า -->
                </div>
            </div>
            
            <!-- ปุ่มเสร็จสิ้น อยู่ขอบล่างตรงกลาง -->
            <div class="absolute bottom-0 left-0 w-full p-6 pb-8 bg-gradient-to-t from-white via-white/90 to-transparent flex justify-center pointer-events-none">
                <button onclick="finishReading()" class="pointer-events-auto bg-green-500 hover:bg-green-600 text-white text-2xl md:text-3xl font-bold py-3 px-10 rounded-full shadow-[0_6px_0_rgb(21,128,61)] active:shadow-[0_0px_0_rgb(21,128,61)] active:translate-y-1 transition-all">
                    อ่านเสร็จสิ้น ✨
                </button>
            </div>
        </div>

        <!-- ================= VIEW 4: หน้าต่าง Pop-up คำถามชวนคิด ================= -->
        <div id="modal-questions" class="hidden absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-30 flex items-center justify-center p-4 fade-in">
            <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl p-8 border-4 border-yellow-200">
                <div class="text-center mb-6">
                    <span class="text-6xl block mb-4">🤔💡</span>
                    <h2 class="text-3xl md:text-4xl font-bold text-orange-500">ชวนคุย ชวนคิด</h2>
                    <p class="text-xl text-gray-500 mt-2">ให้ผู้ปกครองช่วยน้องๆ ตอบคำถามนี้นะคะ</p>
                </div>
                <div class="space-y-6 bg-orange-50 p-6 rounded-3xl border border-orange-100">
                    <div class="flex gap-4">
                        <div class="text-2xl font-bold text-orange-400">1.</div>
                        <p id="q1-text" class="text-2xl md:text-3xl text-gray-700 leading-relaxed"></p>
                    </div>
                    <hr class="border-orange-200">
                    <div class="flex gap-4">
                        <div class="text-2xl font-bold text-orange-400">2.</div>
                        <p id="q2-text" class="text-2xl md:text-3xl text-gray-700 leading-relaxed"></p>
                    </div>
                </div>
                <button onclick="confirmFinish()" class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white text-2xl md:text-3xl font-bold py-4 rounded-2xl shadow-[0_6px_0_rgb(194,65,12)] active:shadow-[0_0px_0_rgb(194,65,12)] active:translate-y-1 transition-all">
                    ตอบคำถามเรียบร้อยแล้ว ตกลง! 👍
                </button>
            </div>
        </div>

    </div>

    <!-- ================= JAVASCRIPT ระบบทำงาน ================= -->
    <script>
        // 🛑 นำ Web App URL ที่ได้จากการ Deploy Google Apps Script มาใส่ตรงนี้ 🛑
        // ตัวอย่าง: "https://script.google.com/macros/s/AKfycb.../exec"
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyf2daZTPwjnhKA4LfwQCy7rCXmSAa21O9ecTihp_eRhjKE8_Xf5B_xmax_PFVGj43CXA/exec"; 

        let currentUser = null;
        let activeArticleId = null;
        let dashboardCache = [];

        // ฟังก์ชันสำหรับสลับหน้าจอ (SPA)
        function showView(viewId) {
            ['view-select-user', 'view-dashboard', 'view-article', 'modal-questions'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        // 1. กดเลือกผู้ใช้ -> โหลดข้อมูล Dashboard
        function selectUser(user) {
            if (GAS_API_URL === "ใส่_ลิงก์_ของคุณตรงนี้" || GAS_API_URL === "") {
                Swal.fire('ตั้งค่าไม่สมบูรณ์', 'กรุณานำ URL ของ Google Apps Script มาใส่ในโค้ดบรรทัด GAS_API_URL ก่อนครับ', 'warning');
                return;
            }

            currentUser = user;
            document.getElementById('dashboard-greeting').innerHTML = user === 'JR' ? '👦🏻 น้องเจอาร์คนเก่ง' : '👧🏻 น้องนโมคนเก่ง';
            
            Swal.fire({
                title: 'กำลังโหลดข้อมูลคนเก่ง...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // ดึงข้อมูลผ่าน Fetch API
            fetch(`${GAS_API_URL}?action=getDashboardData`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'error') throw new Error(data.message);
                    dashboardCache = data;
                    renderDashboard();
                    Swal.close();
                    showView('view-dashboard');
                })
                .catch(err => Swal.fire('เกิดข้อผิดพลาด!', 'ไม่สามารถโหลดข้อมูลได้: ' + err.message, 'error'));
        }

        // 2. ออกจากระบบ
        function logout() { 
            currentUser = null; 
            showView('view-select-user'); 
        }

        // 3. แสดงผลหน้า Dashboard และแถบสถานะ
        function renderDashboard() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';
            const categories = [...new Set(dashboardCache.map(a => a.category))];
            let readCount = 0;

            categories.forEach(category => {
                const section = document.createElement('div');
                section.className = 'mb-8';
                section.innerHTML = `<h3 class="text-2xl font-bold text-gray-700 mb-4 border-b-2 pb-2">📂 ${category}</h3>`;
                
                const list = document.createElement('div');
                list.className = 'space-y-4';

                dashboardCache.filter(a => a.category === category).forEach(article => {
                    const isRead = currentUser === 'JR' ? article.read_JR : article.read_Namo;
                    if(isRead) readCount++;

                    const card = document.createElement('div');
                    card.className = `flex items-center justify-between p-5 rounded-2xl border-2 ${isRead ? 'bg-green-50 border-green-200' : 'bg-white border-gray-200'} shadow-sm active:scale-[0.98] transition-transform cursor-pointer`;
                    card.onclick = () => fetchArticle(article.id, article.title, article.category);
                    card.innerHTML = `
                        <div class="flex-1 pr-4"><h4 class="text-xl md:text-2xl font-bold text-gray-800">${article.title}</h4></div>
                        <div>${isRead ? '<span class="text-3xl">✅</span>' : '<span class="text-3xl opacity-30">📖</span>'}</div>
                    `;
                    list.appendChild(card);
                });
                section.appendChild(list);
                container.appendChild(section);
            });

            const percent = dashboardCache.length === 0 ? 0 : Math.round((readCount / dashboardCache.length) * 100);
            document.getElementById('progress-text').innerText = `${readCount}/${dashboardCache.length}`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        // 4. โหลดเนื้อหาและคำถาม เมื่อผู้ใช้กดอ่านบทความ
        function fetchArticle(id, title, category) {
            activeArticleId = id;
            document.getElementById('article-category-label').innerText = category;
            document.getElementById('article-title').innerText = title;

            Swal.fire({
                title: 'กำลังเตรียมเนื้อหาสนุกๆ...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            fetch(`${GAS_API_URL}?action=getArticleContent&id=${id}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'error') throw new Error(data.message);
                    
                    // สร้างย่อหน้าข้อความ
                    const contentDiv = document.getElementById('article-content');
                    contentDiv.innerHTML = '';
                    data.content.split('\n\n').forEach(pText => {
                        const p = document.createElement('p');
                        p.className = 'indent-10 md:indent-16 mb-6';
                        p.innerText = pText;
                        contentDiv.appendChild(p);
                    });
                    
                    // เตรียมคำถาม
                    document.getElementById('q1-text').innerText = data.q1;
                    document.getElementById('q2-text').innerText = data.q2;
                    
                    // เลื่อนหน้าจอขึ้นบนสุด
                    document.getElementById('view-article').querySelector('.overflow-y-auto').scrollTop = 0;
                    Swal.close();
                    showView('view-article');
                })
                .catch(err => Swal.fire('เกิดข้อผิดพลาด!', 'ไม่สามารถโหลดเนื้อหาได้: ' + err.message, 'error'));
        }

        // 5. เปิดหน้าต่างคำถาม
        function finishReading() {
            document.getElementById('modal-questions').classList.remove('hidden');
        }

        // 6. กดตกลง -> บันทึกสถานะไปที่ Google Sheet
        function confirmFinish() {
            document.getElementById('modal-questions').classList.add('hidden');
            
            Swal.fire({
                title: 'กำลังบันทึกความสำเร็จ! 🌟',
                text: 'รอสักครู่นะครับ...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            fetch(`${GAS_API_URL}?action=markAsRead&id=${activeArticleId}&user=${currentUser}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'error') throw new Error(data.message);
                    
                    // อัปเดตในระบบชั่วคราวให้แสดงเครื่องหมายถูกทันที
                    const article = dashboardCache.find(a => a.id === activeArticleId);
                    if (currentUser === 'JR') article.read_JR = true;
                    if (currentUser === 'Namo') article.read_Namo = true;

                    renderDashboard();
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'ยอดเยี่ยมมาก!',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        showView('view-dashboard');
                    });
                })
                .catch(err => Swal.fire('เกิดข้อผิดพลาด!', 'ไม่สามารถบันทึกข้อมูลได้: ' + err.message, 'error'));
        }
    </script>
</body>
</html>
